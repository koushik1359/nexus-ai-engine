version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexus_db
    environment:
      POSTGRES_USER: koushik
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: nexus_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koushik -d nexus_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://koushik:mysecretpassword@postgres:5432/nexus_ai
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
